<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revolution</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#000;
    font-family:'Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif; }

  #stage { position:fixed; inset:0; overflow:hidden; background:#000; }

  /* ============ PHASE 2 : 레드카펫 씬 (커튼 뒤에 미리 존재) ============ */
  #scene { position:absolute; inset:0; z-index:10; overflow:hidden;
    background:
      radial-gradient(1.5px 1.5px at 12% 18%, rgba(255,235,180,.9), transparent 60%),
      radial-gradient(2px 2px   at 28% 9%,  rgba(255,255,255,.8), transparent 60%),
      radial-gradient(1.5px 1.5px at 44% 22%, rgba(255,220,160,.7), transparent 60%),
      radial-gradient(2px 2px   at 63% 12%, rgba(255,255,255,.75), transparent 60%),
      radial-gradient(1.5px 1.5px at 78% 20%, rgba(255,230,170,.8), transparent 60%),
      radial-gradient(2px 2px   at 90% 8%,  rgba(255,255,255,.7), transparent 60%),
      radial-gradient(30vmax 22vmax at 50% 40%, rgba(120,40,90,.35), transparent 70%),
      linear-gradient(180deg, #05010c 0%, #12041c 40%, #06020c 100%);
  }

  /* 지평선 광채 (목적지의 빛) */
  .horizon-glow { position:absolute; left:50%; top:41%; width:70vmin; height:26vmin;
    transform:translate(-50%,-55%);
    background:radial-gradient(50% 50% at 50% 50%, rgba(255,230,150,.95) 0%,
      rgba(255,170,60,.45) 35%, rgba(255,120,40,.15) 60%, transparent 75%);
    filter:blur(2px); animation:glowPulse 2.2s ease-in-out infinite; }
  @keyframes glowPulse { 0%,100%{opacity:.75; transform:translate(-50%,-55%) scale(1)}
    50%{opacity:1; transform:translate(-50%,-55%) scale(1.12)} }

  /* 바닥 */
  .floor-side { position:absolute; left:0; right:0; top:41%; bottom:0;
    background:linear-gradient(180deg, #0c0716 0%, #170b26 30%, #0a0512 100%); }

  /* 레드카펫 + 차단봉 3D 렌더 캔버스 (JS 원근 투영) */
  #walk { position:absolute; inset:0; display:block; }

  /* 파파라치 카메라 플래시 */
  .cam-flash { position:absolute; width:12vmin; height:12vmin; border-radius:50%;
    pointer-events:none; mix-blend-mode:screen;
    background:radial-gradient(circle, #fff 0%, rgba(255,255,255,.7) 25%, transparent 65%);
    animation:camPop .45s ease-out forwards; }
  @keyframes camPop { 0%{opacity:0; transform:scale(.2)} 18%{opacity:1; transform:scale(1)}
    100%{opacity:0; transform:scale(1.7)} }

  /* 콘페티 */
  .confetti { position:absolute; top:-4vh; width:9px; height:14px; opacity:.95;
    pointer-events:none; animation:confFall linear forwards; }
  @keyframes confFall {
    0%   { transform:translateY(0) rotate(0deg) rotateY(0deg); }
    100% { transform:translateY(110vh) rotate(720deg) rotateY(540deg); opacity:.7; } }

  /* ============ PHASE 3 : 피날레 ============ */
  #finale { position:absolute; inset:0; z-index:30; display:none;
    align-items:center; justify-content:center; flex-direction:column; overflow:hidden;
    background:radial-gradient(80vmax 80vmax at 50% 46%, #2a1030 0%, #120618 45%, #030108 100%); }
  #finale.on { display:flex; }

  /* 회전 후광(갓레이) */
  .rays, .rays2 { position:absolute; left:50%; top:46%; width:140vmax; height:140vmax;
    transform:translate(-50%,-50%); will-change:transform;
    background:repeating-conic-gradient(from 0deg,
      rgba(255,205,90,.16) 0deg 7deg, transparent 7deg 16deg);
    -webkit-mask-image:radial-gradient(circle, #000 0%, transparent 60%);
            mask-image:radial-gradient(circle, #000 0%, transparent 60%);
    animation:raySpin 26s linear infinite; }
  .rays2 { background:repeating-conic-gradient(from 4deg,
      rgba(255,240,180,.10) 0deg 4deg, transparent 4deg 22deg);
    animation:raySpin 38s linear infinite reverse; }
  @keyframes raySpin { to { transform:translate(-50%,-50%) rotate(360deg); } }

  /* 중앙 휘광 오브 */
  .orb { position:absolute; left:50%; top:46%; width:110vmin; height:110vmin;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(255,238,170,.85) 0%, rgba(255,190,70,.35) 28%,
      rgba(255,140,50,.12) 50%, transparent 70%);
    animation:orbPulse 2.6s ease-in-out infinite; filter:blur(1px); }
  @keyframes orbPulse { 0%,100%{transform:translate(-50%,-50%) scale(1); opacity:.85}
    50%{transform:translate(-50%,-50%) scale(1.14); opacity:1} }

  #fx { position:absolute; inset:0; width:100%; height:100%; }

  .title-wrap { position:relative; overflow:hidden; padding:4vmin 6vmin; z-index:5; }
  h1 { font-size:clamp(3.2rem, 13vw, 10rem); font-weight:900; letter-spacing:.04em;
    display:flex; white-space:pre; line-height:1.15;
    filter:drop-shadow(0 0 18px rgba(255,200,90,.85))
           drop-shadow(0 0 60px rgba(255,150,40,.55))
           drop-shadow(0 6px 18px rgba(0,0,0,.8));
    animation:titleBreath 3s 2s ease-in-out infinite; }
  @keyframes titleBreath {
    0%,100%{ filter:drop-shadow(0 0 18px rgba(255,200,90,.85))
      drop-shadow(0 0 60px rgba(255,150,40,.55)) drop-shadow(0 6px 18px rgba(0,0,0,.8)); }
    50%{ filter:drop-shadow(0 0 30px rgba(255,220,120,1))
      drop-shadow(0 0 90px rgba(255,170,60,.8)) drop-shadow(0 6px 18px rgba(0,0,0,.8)); } }
  h1 span { display:inline-block; opacity:0;
    background:linear-gradient(180deg, #fffbe8 0%, #ffe9a0 30%, #ffc93c 55%, #b8741a 78%, #ffe9a0 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    transform:translateY(60px) scale(1.7); filter:blur(14px);
    animation:letterIn .65s cubic-bezier(.2,.9,.3,1.2) forwards; }
  @keyframes letterIn { to { opacity:1; transform:translateY(0) scale(1); filter:blur(0); } }

  /* 글자 위를 스치는 반짝임 */
  .sheen { position:absolute; inset:0; pointer-events:none; mix-blend-mode:overlay;
    background:linear-gradient(115deg, transparent 42%, rgba(255,255,255,.95) 50%, transparent 58%);
    transform:translateX(-120%); animation:sheenSweep 2.6s ease-in-out 1.4s infinite; }
  @keyframes sheenSweep { 0%{transform:translateX(-120%)} 55%,100%{transform:translateX(120%)} }

  #sub { margin-top:2.5vmin; font-size:clamp(.9rem, 2.4vw, 1.5rem); letter-spacing:.55em;
    text-indent:.55em; color:#ffe9b0; opacity:0; z-index:5;
    text-shadow:0 0 14px rgba(255,200,100,.9);
    animation:subIn 1.2s ease 1.5s forwards; }
  @keyframes subIn { from{opacity:0; transform:translateY(16px)} to{opacity:.95; transform:translateY(0)} }

  #replay { margin-top:5vmin; padding:.9em 2.6em; font-size:clamp(.85rem,2vw,1.1rem);
    font-weight:700; letter-spacing:.2em; text-indent:.2em; color:#ffdf8e;
    background:rgba(255,200,90,.06); border:1px solid rgba(255,210,110,.65); border-radius:999px;
    cursor:pointer; opacity:0; pointer-events:none; transition:all .3s; z-index:5;
    font-family:inherit; }
  #replay.show { opacity:1; pointer-events:auto; animation:subIn .8s ease; }
  #replay:hover { background:rgba(255,200,90,.22); color:#fff6dd;
    box-shadow:0 0 24px rgba(255,200,90,.5); transform:scale(1.05); }

  /* ============ 화이트 플래시 & 비네트 ============ */
  #whiteflash { position:absolute; inset:0; z-index:60; background:#fff;
    opacity:0; pointer-events:none; }
  #whiteflash.boom { animation:boom 1s ease-out forwards; }
  @keyframes boom { 0%{opacity:0} 12%{opacity:1} 100%{opacity:0} }

  #vignette { position:absolute; inset:0; z-index:40; pointer-events:none;
    background:radial-gradient(120% 90% at 50% 45%, transparent 55%, rgba(0,0,0,.75) 100%); }

  /* ============ PHASE 1 : 커튼 ============ */
  #curtains { position:absolute; inset:0; z-index:50; }
  .spotlight { position:absolute; top:-25vh; width:55vmax; height:150vmax; z-index:5;
    mix-blend-mode:screen; pointer-events:none; transform-origin:50% 0;
    background:radial-gradient(45% 38% at 50% 12%, rgba(255,245,200,.5) 0%,
      rgba(255,235,170,.18) 45%, transparent 70%); }
  .s1 { left:-8vmax; animation:sweep1 3.4s ease-in-out infinite; }
  .s2 { right:-8vmax; animation:sweep2 3.4s ease-in-out infinite; }
  @keyframes sweep1 { 0%,100%{transform:rotate(-16deg)} 50%{transform:rotate(22deg)} }
  @keyframes sweep2 { 0%,100%{transform:rotate(16deg)} 50%{transform:rotate(-22deg)} }

  .curtain { position:absolute; top:0; height:102%; width:52%; z-index:10;
    background:
      linear-gradient(180deg, rgba(0,0,0,.4) 0%, transparent 18% 70%, rgba(0,0,0,.65) 100%),
      repeating-linear-gradient(90deg,
        #33030b 0px, #6d0a1b 26px, #a5122b 48px, #c21b36 58px,
        #a5122b 68px, #6d0a1b 90px, #33030b 116px);
    box-shadow:inset 0 0 90px rgba(0,0,0,.55);
    animation:sway 4s ease-in-out infinite; }
  .curtain.left  { left:0;  transform-origin:left center;  border-right:3px solid rgba(255,205,100,.35); }
  .curtain.right { right:0; transform-origin:right center; border-left:3px solid rgba(255,205,100,.35);
    animation-delay:-2s; }
  @keyframes sway { 0%,100%{transform:skewX(0)} 50%{transform:skewX(.5deg)} }

  #curtains.open .curtain.left  { animation:openL 2.8s cubic-bezier(.72,.02,.28,1) forwards; }
  #curtains.open .curtain.right { animation:openR 2.8s cubic-bezier(.72,.02,.28,1) forwards; }
  @keyframes openL { 0%{transform:translateX(0) scaleX(1); filter:brightness(1)}
    100%{transform:translateX(-96%) scaleX(.55); filter:brightness(.55)} }
  @keyframes openR { 0%{transform:translateX(0) scaleX(1); filter:brightness(1)}
    100%{transform:translateX(96%) scaleX(.55); filter:brightness(.55)} }

  /* 상단 발란스(주름 장식) */
  .valance { position:absolute; top:0; left:0; right:0; height:13vh; z-index:20;
    background:repeating-linear-gradient(90deg,
      #3d040d 0px, #7c0c1f 30px, #b51530 56px, #7c0c1f 82px, #3d040d 112px);
    box-shadow:0 6px 30px rgba(0,0,0,.8); }
  .valance::after { content:''; position:absolute; left:0; right:0; bottom:-3.2vh; height:6.4vh;
    background:radial-gradient(circle at 50% 0%, #8e0e23 62%, transparent 63%);
    background-size:7.7% 100%; background-repeat:repeat-x;
    filter:drop-shadow(0 5px 6px rgba(0,0,0,.6)); }
  .valance::before { content:''; position:absolute; left:0; right:0; bottom:-.4vh; height:.9vh;
    background:linear-gradient(90deg, #ffdf8e, #b8860b 25%, #ffdf8e 50%, #b8860b 75%, #ffdf8e);
    z-index:2; box-shadow:0 0 12px rgba(255,215,120,.6); }
  #curtains.open .valance { animation:valUp 1.6s ease-in 1s forwards; }
  @keyframes valUp { to { transform:translateY(-160%); } }

  #curtains.done { display:none; }
  #scene.off { display:none; }
</style>
</head>
<body>
<div id="stage">

  <!-- 레드카펫 씬 -->
  <div id="scene">
    <div class="horizon-glow"></div>
    <div class="floor-side"></div>
    <canvas id="walk"></canvas>
    <div id="flashes"></div>
  </div>

  <!-- 피날레 -->
  <div id="finale">
    <div class="rays"></div>
    <div class="rays2"></div>
    <div class="orb"></div>
    <canvas id="fx"></canvas>
    <div class="title-wrap">
      <h1 id="title"></h1>
      <div class="sheen"></div>
    </div>
    <div id="sub">— 지금 접속 바람 —</div>
    <button id="replay">하러가기</button>
  </div>

  <div id="vignette"></div>
  <div id="whiteflash"></div>

  <!-- 커튼 (최상단) -->
  <div id="curtains">
    <div class="spotlight s1"></div>
    <div class="spotlight s2"></div>
    <div class="curtain left"></div>
    <div class="curtain right"></div>
    <div class="valance"></div>
  </div>
</div>

<script>
(function(){
  var curtains = document.getElementById('curtains');
  var scene    = document.getElementById('scene');
  var finale   = document.getElementById('finale');
  var flash    = document.getElementById('whiteflash');
  var replayBt = document.getElementById('replay');
  var timers = [], intervals = [];
  function later(fn, t){ timers.push(setTimeout(fn, t)); }
  function every(fn, t){ intervals.push(setInterval(fn, t)); }

  /* ===== 레드카펫 3D 워크 : 핀홀 카메라 원근 투영 시뮬레이션 =====
     월드 단위는 미터. 카메라가 카펫 위를 전진하며 매 프레임
     카펫/금테/차단봉/로프/그림자를 투영해 캔버스에 그린다. */
  var walk = (function(){
    var cv = document.getElementById('walk');
    var ctx = cv.getContext('2d');
    var W = 0, H = 0, dpr = 1;

    var CAM_H     = 1.55;   // 카메라(눈) 높이
    var CARPET_HW = 1.85;   // 카펫 반폭
    var TRIM_W    = .22;    // 금 테두리 폭
    var POST_X    = 2.42;   // 차단봉 가로 오프셋
    var POST_GAP  = 3.4;    // 차단봉 앞뒤 간격
    var POST_N    = 13;     // 한쪽 라인 개수
    var POLE_H    = 1.02;   // 기둥 높이
    var BALL_R    = .12;    // 꼭대기 구슬 반지름
    var Z_NEAR    = 1.05;
    var Z_RANGE   = POST_GAP * POST_N;

    var zCam = 0, tw = 0;
    var horizonY = 0, focal = 0, bobY = 0, swayX = 0;
    var running = false, frames = 0;

    function fit(){
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = scene.clientWidth  || innerWidth;
      H = scene.clientHeight || innerHeight;
      cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr);
      cv.style.width = W + 'px'; cv.style.height = H + 'px';
    }

    /* 월드 (x, z, 지면기준 높이 y) → 화면 좌표 */
    function proj(x, z, y){
      var s = focal / z;
      return { x: W * .5 + (x - swayX) * s,
               y: horizonY + (CAM_H + bobY - y) * s, s: s };
    }

    /* 간격 g로 바닥에 고정된 패턴 중 카메라 앞 zmin 이후 첫 위치 */
    function firstAt(g, zmin){
      return Math.ceil((zCam + zmin) / g) * g - zCam;
    }

    function carpetPath(hw){
      var fl = proj(-hw, 120, 0), fr = proj(hw, 120, 0);
      var nl = proj(-hw, .8, 0),  nr = proj(hw, .8, 0);
      ctx.beginPath();
      ctx.moveTo(fl.x, fl.y); ctx.lineTo(fr.x, fr.y);
      ctx.lineTo(nr.x, nr.y); ctx.lineTo(nl.x, nl.y);
      ctx.closePath();
    }

    function groundStrip(x1, x2, zNearE, zFarE, color){
      var a = proj(x1, zFarE, 0), b = proj(x2, zFarE, 0);
      var c = proj(x2, zNearE, 0), d = proj(x1, zNearE, 0);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
      ctx.lineTo(c.x, c.y); ctx.lineTo(d.x, d.y);
      ctx.closePath(); ctx.fill();
    }

    function alphaAt(z){
      var aFar  = Math.min(1, (Z_NEAR + Z_RANGE - z) / 7);   // 멀리서 서서히 등장
      var aNear = Math.min(1, Math.max(0, (z - Z_NEAR) / .9)); // 카메라 통과 직전 페이드
      return Math.max(0, Math.min(aFar, aNear));
    }

    function ropeBetween(side, zFar, zNearP){
      var aR = Math.min(alphaAt(zFar), alphaAt(zNearP));
      if (aR <= 0) return;
      var hA = POLE_H * .92;
      var p1 = proj(side * POST_X, zFar, hA);
      var p2 = proj(side * POST_X, zNearP, hA);
      var zm = (zFar + zNearP) / 2;
      var sag = .30 + Math.sin(tw * 2.2 + zm * .7) * .022;  // 벨벳 로프 처짐 + 미세 흔들림
      var pm = proj(side * POST_X, zm, hA - sag);
      var cpx = 2 * pm.x - (p1.x + p2.x) / 2;
      var cpy = 2 * pm.y - (p1.y + p2.y) / 2;
      var lw = Math.max(1, .052 * (focal / zm));
      ctx.globalAlpha = aR;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#7c0a18';
      ctx.lineWidth = lw;
      ctx.beginPath(); ctx.moveTo(p1.x, p1.y);
      ctx.quadraticCurveTo(cpx, cpy, p2.x, p2.y); ctx.stroke();
      ctx.strokeStyle = 'rgba(235,92,108,.75)';               // 윗면 하이라이트
      ctx.lineWidth = lw * .36;
      ctx.beginPath(); ctx.moveTo(p1.x, p1.y - lw * .22);
      ctx.quadraticCurveTo(cpx, cpy - lw * .3, p2.x, p2.y - lw * .22); ctx.stroke();
      ctx.globalAlpha = 1;
    }

    function drawPost(side, z){
      var a = alphaAt(z);
      if (a <= 0) return;
      var sM = focal / z;
      var base = proj(side * POST_X, z, 0);
      if (base.x < -sM || base.x > W + sM) return;

      /* 바닥 그림자 (앞쪽 광원 → 카메라 쪽으로 살짝) */
      var shw = .42 * sM;
      ctx.globalAlpha = a * .55;
      var gS = ctx.createRadialGradient(base.x, base.y + shw * .07, 0,
                                        base.x, base.y + shw * .07, shw);
      gS.addColorStop(0, 'rgba(0,0,0,.6)'); gS.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gS;
      ctx.beginPath();
      ctx.ellipse(base.x, base.y + shw * .07, shw, shw * .3, 0, 0, 6.3);
      ctx.fill();

      /* 광택 바닥 반사 (금빛 세로 스트릭) */
      ctx.globalAlpha = a * .13;
      var rh = POLE_H * sM * .5;
      var gR = ctx.createLinearGradient(0, base.y, 0, base.y + rh);
      gR.addColorStop(0, 'rgba(255,212,120,.95)'); gR.addColorStop(1, 'rgba(255,212,120,0)');
      ctx.fillStyle = gR;
      ctx.fillRect(base.x - .035 * sM, base.y, .07 * sM, rh);

      ctx.globalAlpha = a;
      var top = proj(side * POST_X, z, POLE_H);

      /* 받침 돔 */
      var brx = .17 * sM;
      var gB = ctx.createRadialGradient(base.x - brx * .3, base.y - brx * .3, brx * .1,
                                        base.x, base.y, brx * 1.1);
      gB.addColorStop(0, '#f7dc84'); gB.addColorStop(.55, '#b98d24'); gB.addColorStop(1, '#5a4208');
      ctx.fillStyle = gB;
      ctx.beginPath();
      ctx.ellipse(base.x, base.y - brx * .12, brx, brx * .42, 0, 0, 6.3);
      ctx.fill();

      /* 기둥 (아래가 살짝 굵은 테이퍼 + 가로 금속 셰이딩) */
      var wb = .06 * sM, wt = .042 * sM;
      var gP = ctx.createLinearGradient(base.x - wb, 0, base.x + wb, 0);
      gP.addColorStop(0, '#4d3a08'); gP.addColorStop(.32, '#e9c95e');
      gP.addColorStop(.5, '#fff3c2'); gP.addColorStop(.68, '#caa53c');
      gP.addColorStop(1, '#4d3a08');
      ctx.fillStyle = gP;
      ctx.beginPath();
      ctx.moveTo(base.x - wb * .5, base.y);
      ctx.lineTo(top.x - wt * .5, top.y);
      ctx.lineTo(top.x + wt * .5, top.y);
      ctx.lineTo(base.x + wb * .5, base.y);
      ctx.closePath(); ctx.fill();

      /* 목 부분 링 */
      ctx.fillStyle = '#8a671a';
      ctx.beginPath();
      ctx.ellipse(top.x, top.y, wt * .95, wt * .36, 0, 0, 6.3);
      ctx.fill();

      /* 꼭대기 구슬 + 글로우 + 스펙큘러 */
      var bc = proj(side * POST_X, z, POLE_H + BALL_R * .85);
      var br = BALL_R * sM;
      ctx.globalAlpha = a * .16;
      var gG = ctx.createRadialGradient(bc.x, bc.y, 0, bc.x, bc.y, br * 3);
      gG.addColorStop(0, 'rgba(255,215,120,1)'); gG.addColorStop(1, 'rgba(255,215,120,0)');
      ctx.fillStyle = gG;
      ctx.beginPath(); ctx.arc(bc.x, bc.y, br * 3, 0, 6.3); ctx.fill();
      ctx.globalAlpha = a;
      var gBa = ctx.createRadialGradient(bc.x - br * .36, bc.y - br * .4, br * .12,
                                         bc.x, bc.y, br);
      gBa.addColorStop(0, '#fffce6'); gBa.addColorStop(.35, '#ffd75e');
      gBa.addColorStop(.75, '#a5761b'); gBa.addColorStop(1, '#5f430b');
      ctx.fillStyle = gBa;
      ctx.beginPath(); ctx.arc(bc.x, bc.y, br, 0, 6.3); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,.95)';
      ctx.beginPath(); ctx.arc(bc.x - br * .34, bc.y - br * .42, br * .14, 0, 6.3); ctx.fill();
      ctx.globalAlpha = 1;
    }

    function step(dt){
      tw += dt;
      var r = Math.min(1, tw / 5.6);
      var e = r * r * (3 - 2 * r);          // 점점 빨라지는 전진(smoothstep)
      zCam += (3.0 + 2.9 * e) * dt;
      focal = H * (.88 + .13 * e);          // 미세한 망원 압축(줌 인)
      horizonY = H * .41;
      bobY  = Math.sin(tw * 2.6) * .017 * (.4 + .6 * e);  // 걸음 반동
      swayX = Math.sin(tw * 1.15) * .05;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, W, H);

      var z, k;

      /* 옆 바닥: 은은한 붉은 반사광 + 바닥에 고정된 크로스 타일 */
      var gAmb = ctx.createRadialGradient(W * .5, H, 0, W * .5, H, H * .9);
      gAmb.addColorStop(0, 'rgba(150,15,30,.16)'); gAmb.addColorStop(1, 'rgba(150,15,30,0)');
      ctx.fillStyle = gAmb;
      ctx.fillRect(0, horizonY, W, H - horizonY);
      for (z = firstAt(1.9, 1.0); z < 34; z += 1.9) {
        groundStrip(-9, 9, z, z + .09,
          'rgba(255,255,255,' + (.05 * (1 - z / 34)).toFixed(3) + ')');
      }

      /* 금 테두리(외곽 사다리꼴) → 그 위에 카펫 본체 */
      carpetPath(CARPET_HW + TRIM_W);
      var gT = ctx.createLinearGradient(0, horizonY, 0, H);
      gT.addColorStop(0, '#5c430e'); gT.addColorStop(.45, '#c99a2e');
      gT.addColorStop(.8, '#f3cf6b'); gT.addColorStop(1, '#e0b64a');
      ctx.fillStyle = gT; ctx.fill();

      carpetPath(CARPET_HW);
      var gC = ctx.createLinearGradient(0, horizonY, 0, H);
      gC.addColorStop(0, '#3a0208'); gC.addColorStop(.35, '#7c0513');
      gC.addColorStop(.7, '#b30d20'); gC.addColorStop(1, '#d31428');
      ctx.fillStyle = gC; ctx.fill();

      /* 카펫 위 디테일(클리핑) : 원단 결 + 넓은 광택 밴드 + 라운드 셰이딩 + 빛 웅덩이 */
      ctx.save();
      carpetPath(CARPET_HW); ctx.clip();
      for (z = firstAt(.58, 1.0); z < 30; z += .58) {
        var a1 = .062 * (1 - z / 30) * Math.min(1, (z - .7) / 1.6); // 근접부는 결을 흐릿하게
        if (a1 <= 0) continue;
        groundStrip(-CARPET_HW, CARPET_HW, z, z + .24,
          'rgba(255,150,130,' + a1.toFixed(3) + ')');
        groundStrip(-CARPET_HW, CARPET_HW, z - .08, z,
          'rgba(40,0,6,' + (a1 * .7).toFixed(3) + ')');
      }
      for (z = firstAt(5.2, 1.0); z < 40; z += 5.2) {
        groundStrip(-CARPET_HW, CARPET_HW, z, z + 1.4,
          'rgba(255,215,190,' + (.10 * (1 - z / 40)).toFixed(3) + ')');
      }
      var eL = proj(-CARPET_HW, 2.6, 0).x, eR = proj(CARPET_HW, 2.6, 0).x;
      var gE = ctx.createLinearGradient(eL, 0, eR, 0);
      gE.addColorStop(0, 'rgba(0,0,0,.42)'); gE.addColorStop(.18, 'rgba(0,0,0,0)');
      gE.addColorStop(.82, 'rgba(0,0,0,0)'); gE.addColorStop(1, 'rgba(0,0,0,.42)');
      ctx.fillStyle = gE;
      ctx.fillRect(0, horizonY, W, H - horizonY);
      var pool = proj(0, 13, 0), rp = focal / 13 * 6;
      var gPo = ctx.createRadialGradient(pool.x, pool.y, 0, pool.x, pool.y, rp);
      gPo.addColorStop(0, 'rgba(255,205,120,.30)'); gPo.addColorStop(1, 'rgba(255,205,120,0)');
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = gPo;
      ctx.fillRect(pool.x - rp, pool.y - rp * .5, rp * 2, rp);
      ctx.globalCompositeOperation = 'source-over';
      ctx.restore();

      /* 차단봉 + 로프 : 먼 것부터(painter's algorithm) */
      var items = [];
      for (k = 0; k < POST_N; k++) {
        var rel = ((k * POST_GAP - zCam) % Z_RANGE + Z_RANGE) % Z_RANGE + Z_NEAR;
        items.push({ z: rel, side: -1 }, { z: rel, side: 1 });
      }
      items.sort(function(p, q){ return q.z - p.z; });
      var maxZ = Z_NEAR + Z_RANGE;
      for (k = 0; k < items.length; k++) {
        var it = items[k];
        if (it.z + POST_GAP < maxZ - .01) ropeBetween(it.side, it.z + POST_GAP, it.z);
        drawPost(it.side, it.z);
      }

      /* 지평선 빛 번짐(멀리 있는 것들이 빛 속으로 녹아듦) */
      var gH = ctx.createLinearGradient(0, horizonY - H * .02, 0, horizonY + H * .10);
      gH.addColorStop(0, 'rgba(255,195,110,.34)');
      gH.addColorStop(.45, 'rgba(255,170,80,.12)');
      gH.addColorStop(1, 'rgba(255,170,80,0)');
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = gH;
      ctx.fillRect(0, horizonY - H * .02, W, H * .12);
      ctx.globalCompositeOperation = 'source-over';

      /* 화면 하단 접지 그림자 */
      var gV = ctx.createLinearGradient(0, H * .9, 0, H);
      gV.addColorStop(0, 'rgba(0,0,0,0)'); gV.addColorStop(1, 'rgba(0,0,0,.34)');
      ctx.fillStyle = gV;
      ctx.fillRect(0, H * .9, W, H * .1);

      frames++;
      if (frames % 30 === 0) cv.dataset.frames = frames;
    }

    function start(){
      if (running) return;
      running = true;
      fit();
      addEventListener('resize', fit);
      var last = performance.now();
      (function loop(now){
        if (scene.classList.contains('off')) { running = false; return; }
        var dt = Math.min(.05, (now - last) / 1000);
        last = now;
        step(dt);
        requestAnimationFrame(loop);
      })(last);
    }

    window.__walk = { step: step, fit: fit, canvas: cv };  // 디버그 훅
    return { start: start };
  })();

  /* 파파라치 플래시 */
  var flashes = document.getElementById('flashes');
  function camFlash(){
    var f = document.createElement('div');
    f.className = 'cam-flash';
    var side = Math.random() < .5;
    f.style.left = (side ? 3 + Math.random()*27 : 70 + Math.random()*27) + '%';
    f.style.top  = (12 + Math.random()*42) + '%';
    f.style.width = f.style.height = (5 + Math.random()*11) + 'vmin';
    flashes.appendChild(f);
    setTimeout(function(){ f.remove(); }, 500);
  }

  /* 콘페티 */
  var confColors = ['#ffd54a','#ff5964','#fff3c4','#ffb02e','#ff8fa3'];
  function confetti(container, goldOnly){
    var c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + '%';
    c.style.background = goldOnly
      ? ['#ffd54a','#fff3c4','#ffb02e','#ffe9a0'][Math.floor(Math.random()*4)]
      : confColors[Math.floor(Math.random()*confColors.length)];
    c.style.animationDuration = (2.4 + Math.random()*2) + 's';
    c.style.width  = (6 + Math.random()*6) + 'px';
    c.style.height = (10 + Math.random()*8) + 'px';
    c.addEventListener('animationend', function(){ c.remove(); });
    container.appendChild(c);
  }

  /* 피날레 타이틀 */
  var titleEl = document.getElementById('title');
  var text = '로아 할사람';
  function buildTitle(){
    titleEl.innerHTML = '';
    for (var i = 0; i < text.length; i++) {
      var s = document.createElement('span');
      s.textContent = text[i] === ' ' ? ' ' : text[i];
      s.style.animationDelay = (0.15 + i * 0.14) + 's';
      titleEl.appendChild(s);
    }
  }

  /* 캔버스 금빛 스파크 */
  function startSparks(){
    var cv = document.getElementById('fx'), ctx = cv.getContext('2d');
    function fit(){ cv.width = innerWidth; cv.height = innerHeight; }
    fit(); addEventListener('resize', fit);
    var ps = [];
    for (var i = 0; i < 110; i++) {
      ps.push({ x: Math.random()*innerWidth, y: Math.random()*innerHeight,
        r: .6 + Math.random()*2.4, vy: .25 + Math.random()*.8,
        vx: (Math.random()-.5)*.35, tw: Math.random()*Math.PI*2,
        ts: .03 + Math.random()*.06 });
    }
    (function loop(){
      if (!finale.classList.contains('on')) return;
      ctx.clearRect(0,0,cv.width,cv.height);
      for (var i = 0; i < ps.length; i++) {
        var p = ps[i];
        p.y -= p.vy; p.x += p.vx; p.tw += p.ts;
        if (p.y < -10) { p.y = cv.height + 10; p.x = Math.random()*cv.width; }
        var a = .35 + Math.sin(p.tw) * .35;
        // 흐린 큰 원 + 밝은 작은 원 2겹으로 글로우 표현 (shadowBlur보다 훨씬 빠름)
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 2.6, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,190,90,' + (a * .25) + ')';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,' + (200 + Math.floor(Math.sin(p.tw)*40)) + ',110,' + a + ')';
        ctx.fill();
      }
      requestAnimationFrame(loop);
    })();
  }

  /* ============ 타임라인 ============ */
  // 1.3s  : 커튼 오픈 + 레드카펫 워크 시작
  later(function(){
    curtains.classList.add('open');
    walk.start();
    every(camFlash, 240);
    every(function(){ confetti(scene, false); }, 130);
  }, 1300);

  // 4.2s : 커튼 완전히 열림 → 제거
  later(function(){ curtains.classList.add('done'); }, 4300);

  // 7.3s : 섬광
  later(function(){ flash.classList.add('boom'); }, 7300);

  // 7.65s : 피날레
  later(function(){
    intervals.forEach(clearInterval); intervals = [];
    scene.classList.add('off');
    buildTitle();
    finale.classList.add('on');
    startSparks();
    every(function(){ confetti(finale, true); }, 200);
  }, 7650);

  // 10.2s : 리플레이 버튼
  later(function(){ replayBt.classList.add('show'); }, 10200);

  replayBt.addEventListener('click', function(){ window.location.href = "https://www.koreatoothbank.com/" });
})();
</script>
